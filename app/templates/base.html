<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}VulnBrief{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <a href="/clients" class="brand-title">VulnBrief</a>
  </div>
  <nav class="nav">
    <a href="/clients" class="{% if request.url.path.startswith('/clients') %}active{% endif %}">Clients</a>
    <a href="/briefings" class="{% if request.url.path.startswith('/briefings') %}active{% endif %}">Briefings</a>
  </nav>
</header>
<main class="wrap">
  {% block content %}{% endblock %}
</main>
</body>
</html>
